<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEREK Quick Check</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            margin: 0;
            box-sizing: border-box;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: var(--tg-theme-text-color, #000000);
        }
        p.subtitle {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 8px;
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        select:focus, input:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
        }
    </style>
</head>
<body>

    <h1>ZEREK Quick Check</h1>
    <p class="subtitle">Оцифруй свою идею до того, как потеряешь деньги</p>

    <div class="form-group">
        <label for="city">Город</label>
        <select id="city">
            <option value="ALA">Алматы</option>
            <option value="AST">Астана</option>
            <option value="SHY">Шымкент</option>
            <option value="AKT">Актобе</option>
            <option value="URA">Уральск</option>
        </select>
    </div>

    <div class="form-group">
        <label for="niche">Ниша</label>
        <select id="niche">
            <option value="COFFEE">Кофейня</option>
            <option value="DONER">Донерная</option>
            <option value="CARWASH">Автомойка</option>
            <option value="GROCERY">Продуктовый магазин</option>
        </select>
    </div>

    <div class="form-group">
        <label for="capital">Стартовый капитал (₸)</label>
        <input type="number" id="capital" placeholder="Например: 5000000">
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        tg.MainButton.setText('РАССЧИТАТЬ МОДЕЛЬ');
        tg.MainButton.show();
        tg.MainButton.enable();

        tg.MainButton.onClick(() => {
            tg.HapticFeedback.impactOccurred('medium');
            
            const data = {
                city: document.getElementById('city').value,
                niche: document.getElementById('niche').value,
                capital: document.getElementById('capital').value
            };
            
            tg.sendData(JSON.stringify(data));
            
            tg.MainButton.setText('АНАЛИЗИРУЮ РИСКИ...');
            tg.MainButton.showProgress();
        });
    </script>
</body>
</html>
